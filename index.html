<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spell Shift Sprite Playground</title>
  </head>
  <body>
    <div id="app"></div>
    <aside id="playground-hud" aria-label="Playground controls">
      <p class="title">Spell Shift Sprite Playground</p>
      <p>Use the controls below to play, pause, scrub, and inspect each idle frame.</p>
      <p>Bottom floor collision is enabled so the sprite will not drop below the ground.</p>
      <p>The generated transparent PNG is sliced as 320x320 frames.</p>
      <a class="status" id="status">Loading player sprite...</a>
    </aside>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
